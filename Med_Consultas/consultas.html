<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<header>
    <div class="logo">
        <div class="icon">+</div>
        <div>
            <h1>MedConsultas</h1>
            <span>Gestão de Saúde</span>
        </div>
    </div>

    <nav>
        <a class="dash" href="index.html">Dashboard</a>
        <a class="active" href="consultas.html">Consultas</a>
        <a class="dash" href="lembretes.html" >Lembretes</a>
    </nav>
</header>

<main>

    <div class="topo">
        <div>
            <h2>Consultas</h2>
            <p class="subtitle">Gerencie seus agendamentos médicos</p>
        </div>

        <button class="btn" id="btn-nova-consulta">+ Nova consulta</button>

        <form id="form-consulta" style="display: none;">
            <input type="text" id="nome" placeholder="Nome da especialidade" required>
            <input type="date" id="data" required>
            <input type="time" id="hora" required>
            <input type="text" id="local" placeholder="local da consulta" required>
            <button type="submit">Salvar</button>
        </form>
    </div>

    <section class="lista-consultas">

        <h3>📅 Consultas Agendadas</h3>

        <div id="lista-consultas"></div>

    </section>

</main>

<script src="js/consultas.js"></script>
<script src="js/app.js"></script>
</body>
</html>
