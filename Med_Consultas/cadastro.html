<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro de Usuário</title>
     <link rel="stylesheet" href="styles/style.css">
  </head>
  <body class="corpo_form">


    <form>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    </div>
    <div class="mb-3">
    <label for="exampleInputtel1" class="form-label">Telefone</label>
    <input type="tel" class="form-control" id="exampleInputtel1" placeholder="(11) 99999-9999">
    </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Senha</label>
    <input type="password" class="form-control" id="exampleInputPassword1">
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Confirme a senha</label>
    <input type="password" class="form-control" id="exampleInputPassword1">
  </div>

  <button type="submit" class="btn btn-primary">Enviar</button>
</form>


  <script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
